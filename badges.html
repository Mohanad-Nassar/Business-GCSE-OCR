<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Badges — GCSE Business Studies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="business-style.css"/>
  <style>
    html, body {
      display: block !important;
      grid-template-columns: none !important;
      grid-template-rows: none !important;
      grid-template-areas: none !important;
    }
    header, main { grid-area: unset !important; }
    body { background: var(--paper); color: var(--ink); min-height: 100vh; }
    :focus-visible { outline:3px solid var(--accent); outline-offset:2px; border-radius:4px; }

    header {
      background: var(--ink); border-bottom: 3px solid var(--accent);
      padding: 28px 40px 24px; position: relative; overflow: hidden;
    }
    header::before {
      content:''; position:absolute; top:-50px; right:-50px;
      width:220px; height:220px; border-radius:50%;
      background:var(--accent); opacity:.14; pointer-events:none;
    }
    .header-inner { position:relative; z-index:1; display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:16px; }
    .header-badge {
      display:inline-block; background:var(--accent); color:#fff;
      font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.14em;
      text-transform:uppercase; padding:4px 12px; border-radius:3px; margin-bottom:12px;
    }
    header h1 { font-family:'Playfair Display',serif; font-size:clamp(22px,3.5vw,30px); font-weight:700; color:var(--paper); line-height:1.15; margin-bottom:5px; }
    header p { font-size:13px; color:rgba(245,240,232,.6); }
    .header-links { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start; }
    .nav-link {
      background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
      color:var(--paper); font-family:'DM Mono',monospace; font-size:11px;
      padding:8px 16px; border-radius:6px; text-decoration:none; white-space:nowrap;
      transition:background .15s,border-color .15s;
    }
    .nav-link:hover { background:rgba(255,255,255,.18); border-color:var(--gold); }
    .gcse-account-bar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; font-family:'DM Mono',monospace; font-size:11px; color:rgba(245,240,232,.75); }
    .gcse-account-bar button.nav-link { cursor:pointer; }

    main { max-width:880px; margin:0 auto; padding:32px 24px 80px; }
    .muted { color:var(--mid); font-size:12px; }
    .empty { padding:24px; text-align:center; color:var(--mid); font-style:italic; font-size:13px; }

    .bdg-summary {
      display:flex; align-items:center; gap:20px; flex-wrap:wrap;
      background:var(--card-bg); border:1px solid var(--border); border-radius:12px;
      padding:18px 22px; margin-bottom:28px;
    }
    .bdg-summary-level {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      width:52px; height:52px; border-radius:50%; flex-shrink:0;
      background:linear-gradient(135deg,#7a5c9e,#4a6fa5); color:#fff;
    }
    .bdg-summary-level b { font-family:'Playfair Display',serif; font-weight:700; font-size:19px; line-height:1; }
    .bdg-summary-level span { font-family:'DM Mono',monospace; font-size:7px; letter-spacing:.08em; text-transform:uppercase; opacity:.85; }
    .bdg-summary-stat { font-family:'DM Mono',monospace; font-size:12.5px; color:var(--mid); }
    .bdg-summary-stat b { color:var(--ink); font-size:15px; }
    .bdg-summary-count { margin-left:auto; font-family:'Playfair Display',serif; font-weight:700; font-size:20px; color:var(--gold); white-space:nowrap; }
    .bdg-summary-count small { display:block; font-family:'DM Mono',monospace; font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--mid); font-weight:400; }

    .bdg-group { margin-bottom:30px; }
    .bdg-group-title {
      font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.12em; text-transform:uppercase;
      color:var(--mid); border-bottom:1px solid var(--border); padding-bottom:8px; margin-bottom:14px;
    }
    .bdg-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; }
    .bdg-card {
      display:flex; align-items:center; gap:12px; padding:12px 14px;
      background:var(--cream); border:1.5px solid var(--gold); border-radius:10px;
    }
    .bdg-card.locked { border-color:var(--border); opacity:.6; filter:grayscale(.7); }
    .bdg-icon { font-size:26px; line-height:1; flex-shrink:0; }
    .bdg-name { font-family:'Playfair Display',serif; font-weight:700; font-size:14px; line-height:1.25; }
    .bdg-desc { font-size:11.5px; color:var(--mid); line-height:1.4; margin-top:2px; }
    .bdg-got-chip { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.06em; text-transform:uppercase; color:#2d7a4f; font-weight:700; margin-top:3px; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="header-badge">OCR GCSE Business Studies · J204</div>
      <h1>🏅 Badges</h1>
      <p>Every badge you can earn across the whole course — keep practising to unlock more.</p>
    </div>
    <div class="header-links">
      <a class="nav-link" href="dashboard.html">← Dashboard</a>
    </div>
  </div>
  <div class="gcse-account-bar" id="accountBar" style="padding:0 40px 4px;"></div>
</header>

<main>
  <div id="bdgSummary" class="bdg-summary">
    <div class="empty" style="padding:4px 0;">Loading your badges…</div>
  </div>
  <div id="bdgGroups"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/subjects-index.js"></script>
<script src="/page-groups-all.js"></script>
<script src="/section-totals-all.js"></script>
<script src="/subject-loader.js"></script>
<script>subjectLoaderInit({ mode: 'all' });</script>
<script src="progress-shared.js"></script>
<script src="tasks-shared.js"></script>
<script src="gamification.js"></script>
<script src="badges.js"></script>
<script src="footer-legal.js"></script>
</body>
</html>
