<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your subjects hub — interactive OCR GCSE revision guides with notes, quizzes, flashcards and exam practice.">
  <title>My Subjects – Study Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --ink: #0f1923;
      --paper: #f5f0e8;
      --cream: #ede7d9;
      --accent: #4a6fa5;
      --gold: #d4a843;
      --teal: #1a6b6b;
      --mid: #5a6e7f;
      --border: #c9bfaa;
      --success: #2d7a4f;
      --card-bg: #fffcf6;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* Skip link for keyboard users */
    .skip-link {
      position: absolute;
      left: 12px;
      top: -60px;
      z-index: 100;
      background: var(--ink);
      color: var(--paper);
      padding: 10px 18px;
      border-radius: 0 0 8px 8px;
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      transition: top .15s;
    }

    .skip-link:focus {
      top: 0;
    }

    /* Visible keyboard focus everywhere */
    :focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
      border-radius: 4px;
    }

    .hero :focus-visible {
      outline-color: var(--gold);
    }

    /* ── HERO ── */
    .hero {
      background-color: var(--ink);
      /* Both decorative circles painted as backgrounds so the hero needs
         no overflow:hidden (which would clip the injected account dropdown
         / notification bell panel). */
      background-image:
        radial-gradient(circle 170px at calc(100% - 90px) 90px,
          rgba(122,92,158,.12) 0, rgba(122,92,158,.12) 169px, transparent 170px),
        radial-gradient(circle 110px at calc(30% + 110px) calc(100% - 50px),
          rgba(212,168,67,.08) 0, rgba(212,168,67,.08) 109px, transparent 110px);
      background-repeat: no-repeat;
      color: var(--paper);
      padding: 48px 48px 40px;
      position: relative;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
    }

    .hero-eyebrow {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .badge {
      background: var(--accent);
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 4px 10px;
      border-radius: 3px;
      text-transform: uppercase;
    }

    .badge.gold {
      background: var(--gold);
      color: var(--ink);
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(30px, 5vw, 58px);
      line-height: 1.05;
      margin-bottom: 14px;
      max-width: 720px;
    }

    .hero p {
      font-size: 15px;
      color: #c3ccd4;
      max-width: 560px;
      line-height: 1.7;
      margin-bottom: 8px;
    }

    .hero-nav {
      position: absolute;
      top: 0;
      right: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .hero-nav a,
    .hero-nav button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, .08);
      border: 1px solid rgba(255, 255, 255, .25);
      color: var(--paper);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: .06em;
      padding: 9px 18px;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }

    .hero-nav a:hover,
    .hero-nav button:hover {
      background: rgba(255, 255, 255, .16);
      border-color: var(--gold);
    }

    /* ── MAIN ── */
    .content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 36px 48px 80px;
    }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 18px;
    }

    .hub-loading {
      color: var(--mid);
      font-size: 14px;
      padding: 20px 0;
    }

    .hub-empty {
      background: var(--card-bg);
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 24px 26px;
      color: var(--mid);
      font-size: 14px;
      line-height: 1.6;
      max-width: 620px;
    }

    /* ── SUBJECT CARDS ── */
    .topic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 48px;
    }

    .topic-card {
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 20px 22px 18px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
      overflow: hidden;
      transition: box-shadow .22s, transform .22s, border-color .22s;
    }

    .topic-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      border-radius: 4px 0 0 4px;
      background: var(--accent);
      transition: width .22s;
    }

    .topic-card:hover {
      box-shadow: 0 8px 28px rgba(0, 0, 0, .13);
      transform: translateY(-3px);
      border-color: #b0a490;
    }

    .topic-card:hover::before {
      width: 6px;
    }

    .topic-card .code {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--mid);
      margin-bottom: 8px;
      display: block;
    }

    .topic-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      line-height: 1.35;
      color: var(--ink);
      margin-bottom: 10px;
    }

    .topic-card .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--mid);
      font-family: 'DM Mono', monospace;
    }

    .topic-card:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, .13);
      transform: translateY(-3px);
    }

    .topic-card .arrow {
      margin-left: auto;
      font-size: 14px;
      color: var(--mid);
      transition: transform .22s, color .22s;
    }

    .topic-card:hover .arrow {
      transform: translateX(4px);
      color: var(--ink);
    }

    .topic-card .subject-icon {
      font-size: 26px;
      margin-bottom: 10px;
      display: block;
    }

    /* Sibling of .topic-card (not nested inside it — nested <a> elements
       are invalid HTML), so it's styled off .subject-card-wrap instead. */
    .subject-card-wrap {
      display: flex;
      flex-direction: column;
    }

    .subject-card-wrap .subject-secondary {
      margin-top: 8px;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--accent);
      text-decoration: underline;
      display: inline-block;
    }

    /* WP-A4: per-subject quick actions under each enrolled subject card.
       Sibling of the card <a> for the same nested-anchor reason above. */
    .subject-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .subject-actions a {
      flex: 1 1 auto;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 10.5px;
      letter-spacing: .04em;
      color: var(--ink);
      background: var(--card-bg, #fffcf6);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 6px 10px;
      text-decoration: none;
      white-space: nowrap;
      transition: border-color .15s, background .15s;
    }

    .subject-actions a:hover,
    .subject-actions a:focus-visible {
      border-color: var(--accent);
      background: #fff;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .hero {
        padding: 32px 24px 28px;
      }

      .content {
        padding: 24px 20px 60px;
      }

      .topic-grid {
        grid-template-columns: 1fr;
      }

      .hero-nav {
        position: static;
        margin-bottom: 16px;
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }

      .topic-card:hover,
      .topic-card:focus-visible {
        transform: none;
      }
    }
  </style>
</head>

<body>

  <a class="skip-link" href="#mainContent">Skip to subjects</a>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-inner">
      <nav class="hero-nav" aria-label="Site">
        <span id="accountBar" style="display:inline-flex;align-items:center;gap:10px;"></span>
      </nav>
      <div class="hero-eyebrow">
        <span class="badge">OCR GCSE</span>
        <span class="badge gold">Study Guides</span>
      </div>
      <h1>My Subjects</h1>
      <p id="hubIntro">Interactive revision guides with notes, quizzes, flashcards and exam practice — pick a
        subject to get started.</p>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="content" id="mainContent">
    <h2 class="section-label" id="hubSectionLabel">Subjects</h2>
    <div id="hubGrid" class="hub-loading">Loading your subjects…</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/subjects-index.js"></script>
  <script src="/account-cluster.js"></script>
  <script>
    // Keep these in sync with the constants at the top of script.js.
    const SUPABASE_URL = 'https://eaohjlyiotyqhvsizcpw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhb2hqbHlpb3R5cWh2c2l6Y3B3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNzUzMDksImV4cCI6MjA5ODc1MTMwOX0.lHF4OUiTT3G_fzlXvXI_4QMu48o6eEnq0hWw6K1uBAk';
    const GCSE_SESSION_KEY = 'gcse_session_v1';

    // Non-redirecting read of the cached session — unlike tasksAuthInit()
    // (tasks-shared.js) / the old per-page login guards, this hub must
    // stay reachable by logged-out visitors, so it only ever *reads* the
    // cache here and decides which view to render; it never redirects to
    // login.html on its own.
    function hubReadSession() {
      try { return JSON.parse(localStorage.getItem(GCSE_SESSION_KEY) || 'null'); } catch (e) { return null; }
    }

    // Note: the optional "My Progress" secondary link is rendered as a
    // sibling of the card <a>, not nested inside it — nested <a> elements
    // are invalid HTML and browsers silently break out of the outer
    // anchor when they hit one, which would make the card's own link
    // target unpredictable.
    function subjectCardHtml(subject, opts) {
      opts = opts || {};
      const href = opts.href || `/subjects/${subject.slug}/index.html`;
      const accent = subject.colour ? ` style="--accent:${subject.colour}"` : '';
      const examBoard = subject.examBoard || subject.exam_board || 'OCR';
      const specCode = subject.specCode || subject.spec_code || '';
      const level = subject.level || '';
      const card = `<a class="topic-card" href="${href}"${accent}>
          <span class="subject-icon" aria-hidden="true">${subject.icon || '📘'}</span>
          <span class="code">${examBoard}${specCode ? ' · ' + specCode : ''}</span>
          <h3>${subject.name}</h3>
          <div class="card-meta">
            <span>${level}${opts.tag ? ' · ' + opts.tag : ''}</span>
            <span class="arrow" aria-hidden="true">→</span>
          </div>
        </a>`;
      if (opts.actions) return `<div class="subject-card-wrap">${card}${subjectActionsHtml(subject.slug)}</div>`;
      if (!opts.secondaryHref) return `<div class="subject-card-wrap">${card}</div>`;
      return `<div class="subject-card-wrap">${card}<a class="subject-secondary" href="${opts.secondaryHref}">📊 My Progress →</a></div>`;
    }

    // WP-A4: every feature reachable per subject straight from the hub.
    // The card itself opens the topic list; these pills deep-link the rest.
    function subjectActionsHtml(slug) {
      const s = encodeURIComponent(slug);
      return `<div class="subject-actions" role="group" aria-label="Quick links">
        <a href="/dashboard.html?subject=${s}">📊 Dashboard</a>
        <a href="/daily-revise.html?subject=${s}">🎯 Daily Revise</a>
        <a href="/dashboard.html?subject=${s}#tasksSection">📋 Tasks</a>
        <a href="/review-calendar.html?subject=${s}">🗓️ Calendar</a>
      </div>`;
    }

    // Logged-out (or role-less/corrupted session) view: every subject in
    // the registry, Business real, the rest clearly tagged so nobody
    // mistakes a placeholder for finished content.
    function renderPublicSubjectsHub() {
      document.getElementById('hubSectionLabel').textContent = 'Subjects';
      const subjects = window.SUBJECTS || [];
      const grid = document.getElementById('hubGrid');
      grid.classList.remove('hub-loading');
      grid.innerHTML = subjects.map(s => subjectCardHtml(s, { tag: s.slug === 'business' ? '' : 'Coming soon' })).join('');
    }

    // Logged-in student view: only the subjects get_my_subjects() returns
    // (their own classes) — a subject a student isn't enrolled in is
    // fully hidden here, not shown as "coming soon" clutter.
    function renderStudentSubjectsHub(rows) {
      document.getElementById('hubSectionLabel').textContent = 'Your Subjects';
      const grid = document.getElementById('hubGrid');
      grid.classList.remove('hub-loading');
      if (!rows.length) {
        grid.innerHTML = `<div class="hub-empty">You're not enrolled in any class yet, so there's nothing to show
          here. Got a class code from your teacher? <a href="/join.html" style="font-weight:600;">Join your class →</a><br/>
          No code yet? Ask your teacher for one, then come back.</div>`;
        return;
      }
      grid.innerHTML = rows.map(s => subjectCardHtml(s, { actions: true })).join('');
      // WP-A5: one calendar across every subject (reviews + task deadlines,
      // filterable there) — only worth surfacing for multi-subject students.
      if (rows.length > 1) {
        grid.insertAdjacentHTML('beforeend',
          `<div class="subject-card-wrap"><a class="topic-card" href="/review-calendar.html?subject=all" style="--accent:var(--gold)">
            <span class="subject-icon" aria-hidden="true">🗓️</span>
            <span class="code">ALL SUBJECTS</span>
            <h3>Combined Calendar</h3>
            <div class="card-meta"><span>Reviews + task deadlines in one view</span><span class="arrow" aria-hidden="true">→</span></div>
          </a></div>`);
      }
    }

    async function hubInitAccountBar(cached, supabaseClient) {
      const bar = document.getElementById('accountBar');
      if (!bar) return;
      // Same shared avatar + dropdown cluster as every other page (script.js).
      if (typeof _gcseInjectAccountBar === 'function') {
        window._gcseProfile = window._gcseProfile || { username: cached.username, role: cached.role };
        window._gcseSupabaseClient = window._gcseSupabaseClient || supabaseClient;
        _gcseInjectAccountBar();
        return;
      }
      const escName = String(cached.username || 'you').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
      bar.innerHTML = `<span style="font-size:13px;color:rgba(255,255,255,.75);">Hi, <strong>${escName}</strong></span>
        <a href="/manage-account.html" id="manageAccountLink">⚙ <span>Manage Account</span></a>
        <a href="#" id="homeLogoutLink">↪ <span>Log out</span></a>`;
      document.getElementById('homeLogoutLink').addEventListener('click', async (e) => {
        e.preventDefault();
        await supabaseClient.auth.signOut();
        localStorage.removeItem(GCSE_SESSION_KEY);
        location.reload();
      });
    }

    async function hubInit() {
      const cached = hubReadSession();

      // No session, or a corrupted/role-less cache — public hub.
      if (!cached || !cached.access_token) {
        renderPublicSubjectsHub();
        return;
      }

      // Teachers manage their subjects/classes from the teacher dashboard,
      // not this student-facing hub — send them straight there (mirrors
      // dashboard.html's initDashboardAuth(), which does the same before
      // it ever touches student-only data).
      if (cached.role === 'teacher') {
        location.replace('/teacher-dashboard.html');
        return;
      }

      if (cached.role !== 'student') {
        renderPublicSubjectsHub();
        return;
      }

      const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      window._gcseSupabaseClient = supabaseClient;
      const { data, error } = await supabaseClient.auth.setSession({
        access_token: cached.access_token, refresh_token: cached.refresh_token,
      });
      if (error || !data.session) {
        localStorage.removeItem(GCSE_SESSION_KEY);
        renderPublicSubjectsHub();
        return;
      }
      localStorage.setItem(GCSE_SESSION_KEY, JSON.stringify({
        access_token: data.session.access_token, refresh_token: data.session.refresh_token,
        expires_at: data.session.expires_at, role: cached.role, username: cached.username,
      }));

      hubInitAccountBar(cached, supabaseClient);
      document.getElementById('hubIntro').textContent =
        'Pick up where you left off, or jump into a subject to browse every topic.';

      try {
        const { data: subjects, error: subjectsErr } = await supabaseClient.rpc('get_my_subjects');
        if (subjectsErr) { console.error('get_my_subjects', subjectsErr); renderStudentSubjectsHub([]); return; }
        renderStudentSubjectsHub(subjects || []);
      } catch (e) {
        console.error('get_my_subjects', e);
        renderStudentSubjectsHub([]);
      }
    }

    hubInit();
  </script>
<script src="notifications-shared.js"></script>
<script src="onboarding-tour.js"></script>
<script src="footer-legal.js"></script>
</body>

</html>
