<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&amp;family=DM+Sans:wght@300;400;500;600&amp;family=Playfair+Display:wght@600;700&amp;display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="business-style.css"/>
  <style>
    /* Hard reset: business-style.css turns <body> into a sidebar grid on
       desktop for topic pages. This standalone page has no sidebar. */
    html, body {
      display: block !important;
      grid-template-columns: none !important;
      grid-template-rows: none !important;
      grid-template-areas: none !important;
    }
    header, main { grid-area: unset !important; }
    body { background: var(--paper); color: var(--ink); min-height: 100vh; overflow-x: hidden; }
    :focus-visible { outline:3px solid var(--accent); outline-offset:2px; border-radius:4px; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation:none !important; transition:none !important; }
    }

    /* ── Header (mirrors review-calendar / daily-revise) ── */
    header {
      background-color: var(--chrome, var(--ink)); border-bottom: 3px solid var(--accent);
      background-image: radial-gradient(circle 110px at calc(100% - 60px) 60px,
        rgba(122,92,158,.14) 0, rgba(122,92,158,.14) 109px, transparent 110px);
      background-repeat: no-repeat;
      padding: 28px 40px 24px; position: relative;
    }
    .header-inner { position:relative; z-index:1; display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:16px; }
    .header-badge {
      display:inline-block; background:var(--accent); color:#fff;
      font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.14em;
      text-transform:uppercase; padding:4px 12px; border-radius:3px; margin-bottom:12px;
    }
    header h1 { font-family:'Playfair Display',serif; font-size:clamp(22px,3.5vw,30px); font-weight:700; color:var(--chrome-text, var(--paper)); line-height:1.15; margin-bottom:5px; }
    header p { font-size:13px; color:rgba(245,240,232,.6); max-width:60ch; }
    .header-links { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start; }
    .nav-link {
      background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
      color:var(--chrome-text, var(--paper)); font-family:'DM Mono',monospace; font-size:11px;
      padding:8px 16px; border-radius:6px; text-decoration:none; white-space:nowrap; cursor:pointer;
      transition:background .15s,border-color .15s;
    }
    .nav-link:hover { background:rgba(255,255,255,.18); border-color:var(--gold); }
    .gcse-account-bar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; font-family:'DM Mono',monospace; font-size:11px; color:rgba(245,240,232,.75); }
    .gcse-account-bar button.nav-link { cursor:pointer; }

    main { max-width:900px; margin:0 auto; padding:28px 24px 80px; }
    .panel { background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:20px 22px; margin-bottom:20px; }
    .muted { color:var(--mid); font-size:12.5px; line-height:1.6; }

    /* ── Control bars (scope / metric / window) ── */
    .lb-controls { display:flex; flex-direction:column; gap:12px; }
    .lb-row { display:flex; flex-wrap:wrap; gap:8px 10px; align-items:center; }
    .lb-rowlabel { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.09em; text-transform:uppercase; color:var(--mid); min-width:56px; }
    .lb-seg { display:inline-flex; flex-wrap:wrap; gap:4px; background:var(--cream); border:1px solid var(--border); border-radius:99px; padding:3px; }
    .lb-seg button {
      background:transparent; border:none; color:var(--mid); cursor:pointer;
      font-family:'DM Sans',sans-serif; font-size:12.5px; font-weight:600;
      padding:6px 14px; border-radius:99px; white-space:nowrap; transition:background .15s,color .15s;
    }
    .lb-seg button:hover { color:var(--ink); }
    .lb-seg button[aria-pressed="true"] { background:var(--accent); color:#fff; }
    .lb-classpick { display:none; align-items:center; gap:8px; }
    .lb-classpick select, .lb-groupsel select {
      background:var(--card-bg); border:1px solid var(--border); color:var(--ink);
      border-radius:8px; padding:7px 10px; font-family:'DM Sans',sans-serif; font-size:12.5px;
    }
    .lb-spacer { flex:1 1 auto; }
    .lb-manage { background:transparent; border:1px solid var(--border); color:var(--ink); font-family:'DM Mono',monospace; font-size:11.5px; padding:7px 14px; border-radius:8px; cursor:pointer; }
    .lb-manage:hover { border-color:var(--accent); color:var(--accent); }

    /* ── Banners ── */
    .lb-banner { display:flex; align-items:center; gap:10px; font-size:12.5px; line-height:1.5;
      border-radius:9px; padding:10px 14px; margin-bottom:16px; }
    .lb-banner.info { background:color-mix(in srgb, var(--accent) 10%, var(--card-bg)); border:1px solid color-mix(in srgb, var(--accent) 30%, var(--border)); color:var(--ink); }
    .lb-banner.improve { background:color-mix(in srgb, var(--gold) 16%, var(--card-bg)); border:1px solid color-mix(in srgb, var(--gold) 40%, var(--border)); color:var(--ink); }
    .lb-banner .lb-b-emoji { font-size:20px; line-height:1; flex:0 0 auto; }

    /* ── Board ── */
    .lb-board { display:flex; flex-direction:column; }
    .lb-head, .lb-rowitem {
      display:grid; grid-template-columns: 46px 1fr auto; align-items:center; gap:12px;
      padding:11px 12px;
    }
    .lb-head { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--mid); border-bottom:1px solid var(--border); padding-bottom:8px; }
    .lb-rowitem { border-bottom:1px solid var(--border); border-radius:8px; }
    .lb-rowitem:last-child { border-bottom:none; }
    .lb-rowitem.is-self { background:color-mix(in srgb, var(--accent) 12%, var(--card-bg)); border:1px solid color-mix(in srgb, var(--accent) 34%, var(--border)); }
    .lb-rank { display:flex; align-items:center; gap:5px; font-family:'DM Mono',monospace; font-weight:600; font-size:15px; color:var(--ink); }
    .lb-rank .medal { font-size:18px; }
    .lb-move { font-family:'DM Mono',monospace; font-size:10.5px; font-weight:600; display:inline-flex; align-items:center; gap:1px; }
    .lb-move.up { color:var(--success, #1a7a44); }
    .lb-move.down { color:var(--wrong, #b23b2e); }
    .lb-move.same { color:var(--mid); }
    .lb-who { min-width:0; display:flex; align-items:center; gap:9px; }
    .lb-avatar { flex:0 0 auto; width:32px; height:32px; border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-family:'DM Mono',monospace; font-size:13px; font-weight:600; }
    .lb-avatar.anon { background:var(--mid); }
    .lb-name-wrap { min-width:0; }
    .lb-name { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .lb-you-pill { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.05em; background:var(--accent); color:#fff; padding:1px 6px; border-radius:99px; margin-left:6px; vertical-align:middle; }
    .lb-classtag { display:inline-block; font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.03em; color:var(--mid); background:var(--cream); border:1px solid var(--border); border-radius:99px; padding:1px 7px; margin-top:3px; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .lb-stat { text-align:right; }
    .lb-stat b { font-family:'DM Mono',monospace; font-size:16px; color:var(--ink); }
    .lb-stat .lb-stat-sub { display:block; font-family:'DM Mono',monospace; font-size:10px; color:var(--mid); margin-top:2px; }

    /* ── Comparison columns: rank by one metric, but see every metric side by
       side. The ranked (selected) column is accent-coloured with a faint tint;
       the rest are greyed and never affect the order. On narrow screens the
       whole board scrolls sideways (min-width forces overflow) so nothing is
       dropped. Both --lb-cols and --lb-min are set per-board in leaderboard.js
       (lbSetGrid) from the column count; the ID-scoped selectors below beat the
       base 3-column rule and the small-screen collapse. */
    #lbBoard.lb-multi { overflow-x:auto; overflow-y:hidden; }
    #lbBoard.lb-multi .lb-head,
    #lbBoard.lb-multi .lb-rowitem {
      grid-template-columns: var(--lb-cols);
      min-width: var(--lb-min);
    }
    .lb-mcell { display:flex; flex-direction:column; align-items:flex-end; justify-content:center; align-self:stretch; font-family:'DM Mono',monospace; padding:0 7px; }
    .lb-mcell .lb-mval { font-size:15px; color:var(--mid); font-weight:500; white-space:nowrap; }
    .lb-mcell .lb-msub { font-size:9px; color:var(--mid); opacity:.75; margin-top:1px; white-space:nowrap; }
    .lb-head .lb-mcell { font-size:10px; color:var(--mid); font-weight:500; }
    .lb-mcell.sel { background:color-mix(in srgb, var(--accent) 10%, transparent); }
    .lb-mcell.sel .lb-mval { color:var(--accent); font-weight:700; font-size:16px; }
    .lb-head .lb-mcell.sel { color:var(--accent); font-weight:700; }

    .lb-divider { text-align:center; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--mid); padding:8px 0; }

    /* Empty / message states */
    .lb-empty { text-align:center; padding:26px 10px; }
    .lb-empty-emoji { font-size:36px; margin-bottom:10px; }
    .lb-empty p { font-size:14px; margin:5px 0; }
    .lb-inline-link { color:var(--accent); font-weight:600; text-decoration:none; }
    .lb-inline-link:hover { text-decoration:underline; }

    /* ── Modal (teacher settings) ── */
    .lb-modal-backdrop { position:fixed; inset:0; background:rgba(15,25,35,.45); z-index:899; opacity:0; pointer-events:none; transition:opacity .2s ease; }
    .lb-modal-backdrop.show { opacity:1; pointer-events:auto; }
    .lb-modal {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-46%) scale(.98);
      width:640px; max-width:94vw; max-height:90vh; overflow-y:auto;
      background:var(--card-bg); border:1px solid var(--border); border-radius:14px;
      box-shadow:0 20px 60px rgba(0,0,0,.28); z-index:900; padding:24px 26px;
      opacity:0; pointer-events:none; transition:opacity .2s ease, transform .2s ease;
    }
    .lb-modal.show { opacity:1; pointer-events:auto; transform:translate(-50%,-50%) scale(1); }
    .lb-modal-close { position:absolute; top:12px; right:14px; background:none; border:none; font-size:17px; cursor:pointer; color:var(--mid); padding:4px 8px; border-radius:6px; line-height:1; }
    .lb-modal-close:hover { background:var(--cream); color:var(--ink); }
    .lb-modal h2 { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; margin-bottom:4px; }
    .lb-set-class { border:1px solid var(--border); border-radius:10px; padding:14px 16px; margin-top:14px; }
    .lb-set-class h3 { font-size:15px; font-weight:600; margin-bottom:10px; }
    .lb-set-line { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:9px; font-size:13px; }
    .lb-set-line label { display:flex; align-items:center; gap:7px; cursor:pointer; }
    .lb-set-line input[type="number"] { width:64px; background:var(--cream); border:1px solid var(--border); border-radius:6px; padding:4px 8px; font-family:'DM Mono',monospace; color:var(--ink); }
    .lb-excludes { margin-top:6px; display:flex; flex-wrap:wrap; gap:6px; }
    .lb-exchip { font-size:11.5px; font-family:'DM Mono',monospace; border:1px solid var(--border); background:var(--cream); color:var(--mid); border-radius:99px; padding:3px 10px; cursor:pointer; }
    .lb-exchip[aria-pressed="true"] { background:color-mix(in srgb, var(--wrong) 18%, var(--card-bg)); border-color:var(--wrong); color:var(--wrong); text-decoration:line-through; }
    .btn { background:var(--chrome, var(--ink)); color:var(--chrome-text, var(--paper)); border:none; padding:9px 16px; border-radius:7px; font-family:'DM Sans',sans-serif; font-weight:600; font-size:13px; cursor:pointer; }
    .btn:hover { background:#1c2c3d; }
    .btn-ghost { background:transparent; color:var(--ink); border:1px solid var(--border); }
    .btn-ghost:hover { background:var(--cream); border-color:var(--accent); }
    .lb-groups-wrap { margin-top:18px; border-top:1px solid var(--border); padding-top:16px; }
    .lb-group-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:8px; font-size:13px; }

    @media (max-width:560px) {
      header { padding:22px 20px 20px; }
      main { padding:22px 14px 70px; }
      .panel { padding:16px 14px; }
      .lb-head, .lb-rowitem { grid-template-columns: 38px 1fr auto; gap:8px; padding:10px 6px; }
      .lb-avatar { display:none; }
    }
  </style>
</head>
<body>

<header>
  <nav class="site-band" aria-label="Site">
    <a class="sb-brand" href="/hub.html"><span aria-hidden="true">🏡</span> All Topics</a>
    <a class="nav-link" id="lbDashLink" href="dashboard.html">📊 My Progress</a>
    <span class="gcse-account-bar" id="accountBar"></span>
  </nav>
  <div class="header-inner">
    <div>
      <div class="header-badge" id="lbSubjectBadge">Leaderboard</div>
      <h1>🏆 Leaderboard</h1>
      <p>See how you and your class are doing — for effort, accuracy and mastery. Every point here comes from real practice across the site.</p>
    </div>
    <div class="header-links">
      <a class="nav-link" id="lbDailyLink" href="daily-revise.html">🎯 Daily Revise</a>
      <a class="nav-link" id="lbBadgesLink" href="badges.html">🏅 Badges</a>
    </div>
  </div>
</header>

<main>
  <div class="panel">
    <div class="lb-controls" id="lbControls">
      <div class="lb-row">
        <span class="lb-rowlabel">Board</span>
        <span class="lb-seg" id="lbScopeSeg" role="group" aria-label="Board scope"></span>
        <span class="lb-classpick" id="lbClassPick">
          <label class="lb-rowlabel" for="lbClassSelect" style="min-width:auto;">Class</label>
          <select id="lbClassSelect" aria-label="Choose class"></select>
        </span>
        <span class="lb-groupsel" id="lbGroupSel" style="display:none;"></span>
        <span class="lb-spacer"></span>
        <button type="button" class="lb-manage" id="lbManageBtn" style="display:none;">⚙ Manage</button>
      </div>
      <div class="lb-row">
        <span class="lb-rowlabel">Rank by</span>
        <span class="lb-seg" id="lbMetricSeg" role="group" aria-label="Metric"></span>
      </div>
      <div class="lb-row">
        <span class="lb-rowlabel">Period</span>
        <span class="lb-seg" id="lbWindowSeg" role="group" aria-label="Time period"></span>
      </div>
    </div>
  </div>

  <div id="lbBanners"></div>

  <div class="panel">
    <div id="lbBoard">
      <div class="lb-empty"><div class="lb-empty-emoji">⏳</div><p>Loading the leaderboard…</p></div>
    </div>
  </div>

  <p class="muted" id="lbFootnote"></p>
</main>

<!-- Teacher settings modal -->
<div class="lb-modal-backdrop" id="lbModalBackdrop"></div>
<div class="lb-modal" id="lbModal" role="dialog" aria-modal="true" aria-label="Leaderboard settings">
  <button type="button" class="lb-modal-close" id="lbModalClose" aria-label="Close">✕</button>
  <div id="lbModalBody"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/subjects-index.js"></script>
<script src="/page-groups-all.js"></script>
<script src="/section-totals-all.js"></script>
<script src="/subject-loader.js"></script>
<script>subjectLoaderInit({ mode: 'single' });</script>
<script src="tasks-shared.js"></script>
<script src="/account-cluster.js"></script>
<script src="/notifications-shared.js"></script>
<script src="/content-protect.js"></script>
<script src="gamification.js"></script>
<script src="leaderboard.js"></script>
<script src="footer-legal.js"></script>
  <script src="searchable-select.js" defer></script>
</body>
</html>
