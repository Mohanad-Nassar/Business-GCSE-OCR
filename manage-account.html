<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Account — GCSE Business Studies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="business-style.css"/>
  <style>
    html, body {
      display: block !important;
      grid-template-columns: none !important;
      grid-template-rows: none !important;
      grid-template-areas: none !important;
    }
    header, main { grid-area: unset !important; }
    body { background: var(--paper); color: var(--ink); min-height: 100vh; }
    :focus-visible { outline:3px solid var(--accent); outline-offset:2px; border-radius:4px; }

    header {
      background: var(--ink); border-bottom: 3px solid var(--accent);
      padding: 28px 40px 24px; position: relative; overflow: hidden;
    }
    header::before {
      content:''; position:absolute; top:-50px; right:-50px;
      width:220px; height:220px; border-radius:50%;
      background:var(--accent); opacity:.14; pointer-events:none;
    }
    .header-inner { position:relative; z-index:1; display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:16px; }
    .header-badge {
      display:inline-block; background:var(--accent); color:#fff;
      font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.14em;
      text-transform:uppercase; padding:4px 12px; border-radius:3px; margin-bottom:12px;
    }
    header h1 { font-family:'Playfair Display',serif; font-size:clamp(22px,3.5vw,30px); font-weight:700; color:var(--paper); line-height:1.15; margin-bottom:5px; }
    header p { font-size:13px; color:rgba(245,240,232,.6); }
    .header-links { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start; }
    .nav-link {
      background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
      color:var(--paper); font-family:'DM Mono',monospace; font-size:11px;
      padding:8px 16px; border-radius:6px; text-decoration:none; white-space:nowrap;
      transition:background .15s,border-color .15s;
    }
    .nav-link:hover { background:rgba(255,255,255,.18); border-color:var(--gold); }
    .gcse-account-bar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; font-family:'DM Mono',monospace; font-size:11px; color:rgba(245,240,232,.75); }
    .gcse-account-bar button.nav-link { cursor:pointer; }

    main { max-width:720px; margin:0 auto; padding:32px 24px 80px; }
    .panel { background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:26px 28px; }

    /* ── tabs (matches login.html's proven component) ── */
    .tabs { display:flex; gap:6px; margin-bottom:22px; border-bottom:1px solid var(--border); }
    .tab-btn {
      flex:1; background:none; border:none; padding:10px 4px 12px;
      font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase;
      color:var(--mid); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px;
    }
    .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    .detail-row { display:flex; justify-content:space-between; align-items:baseline; gap:12px; padding:11px 0; border-bottom:1px solid var(--border); font-size:13.5px; }
    .detail-row:last-child { border-bottom:none; }
    .detail-row .l { font-family:'DM Mono',monospace; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--mid); }
    .detail-row .v { font-weight:600; text-align:right; }

    .subhead { font-family:'Playfair Display',serif; font-size:17px; font-weight:700; margin:26px 0 10px; }
    .class-row { display:flex; justify-content:space-between; align-items:baseline; gap:12px; padding:12px 14px; background:var(--cream); border-radius:8px; margin-bottom:8px; font-size:13px; }
    .class-row .cname { font-weight:600; }
    .class-row .cmeta { font-family:'DM Mono',monospace; font-size:11px; color:var(--mid); text-align:right; }
    .empty { padding:18px; text-align:center; color:var(--mid); font-style:italic; font-size:13px; }

    form { display:flex; flex-direction:column; gap:14px; max-width:360px; }
    label { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--mid); display:block; margin-bottom:6px; }
    input {
      width:100%; padding:11px 13px; border:1px solid var(--border); border-radius:7px;
      font-family:'DM Sans',sans-serif; font-size:14px; background:#fff; color:var(--ink);
    }
    input:focus { border-color:var(--accent); }
    .pw-wrap { position:relative; }
    .pw-wrap input { padding-right:64px; }
    .pw-toggle {
      position:absolute; right:6px; top:50%; transform:translateY(-50%);
      background:none; border:none; color:var(--mid); cursor:pointer;
      font-family:'DM Mono',monospace; font-size:10.5px; letter-spacing:.05em;
      text-transform:uppercase; padding:6px 8px; border-radius:5px;
    }
    .pw-toggle:hover { color:var(--ink); background:var(--cream); }
    .hint { font-size:11.5px; color:var(--mid); line-height:1.5; background:var(--cream); border:1px solid var(--border); border-radius:7px; padding:9px 12px; }
    button[type=submit] {
      margin-top:2px; background:var(--ink); color:var(--paper); border:none;
      padding:12px; border-radius:7px; font-family:'DM Sans',sans-serif; font-weight:600; font-size:14px;
      cursor:pointer; transition:background .15s;
    }
    button[type=submit]:hover { background:#1c2c3d; }
    button[type=submit]:disabled { opacity:.6; cursor:default; }

    .msg { font-size:12.5px; padding:10px 12px; border-radius:6px; display:none; }
    .msg.show { display:block; }
    .msg.error { background:rgba(200,75,49,.1); color:var(--wrong); border:1px solid rgba(200,75,49,.25); }
    .msg.ok { background:rgba(45,122,79,.1); color:#2d7a4f; border:1px solid rgba(45,122,79,.25); }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="header-badge">OCR GCSE Business Studies · J204</div>
      <h1>⚙ Manage Account</h1>
      <p>Your account details and login</p>
    </div>
    <div class="header-links">
      <a class="nav-link" href="dashboard.html">← Dashboard</a>
    </div>
  </div>
  <div class="gcse-account-bar" id="accountBar" style="padding:0 40px 4px;"></div>
</header>

<main>
  <div class="panel">
    <div class="tabs" role="tablist">
      <button type="button" class="tab-btn active" id="tabAccountBtn" role="tab" aria-selected="true">Account</button>
      <button type="button" class="tab-btn" id="tabPasswordBtn" role="tab" aria-selected="false">Password</button>
    </div>

    <div class="tab-panel active" id="panelAccount">
      <div class="detail-row"><span class="l">Username</span><span class="v" id="acctUsername">—</span></div>
      <div class="detail-row"><span class="l">Role</span><span class="v" id="acctRole">—</span></div>
      <div class="detail-row"><span class="l">Member since</span><span class="v" id="acctSince">—</span></div>

      <h3 class="subhead">My Classes</h3>
      <div id="acctClasses"><div class="empty">Loading…</div></div>
    </div>

    <div class="tab-panel" id="panelPassword">
      <div class="hint" style="margin-bottom:16px;">Choose a password that's easy for you to remember but hard for someone else to guess — at least 8 characters.</div>
      <form id="passwordForm">
        <div>
          <label for="newPassword">New password</label>
          <div class="pw-wrap">
            <input type="password" id="newPassword" autocomplete="new-password" required minlength="8"/>
            <button type="button" class="pw-toggle" data-for="newPassword" aria-label="Show password">Show</button>
          </div>
        </div>
        <div>
          <label for="confirmPassword">Confirm new password</label>
          <div class="pw-wrap">
            <input type="password" id="confirmPassword" autocomplete="new-password" required minlength="8"/>
            <button type="button" class="pw-toggle" data-for="confirmPassword" aria-label="Show password">Show</button>
          </div>
        </div>
        <div class="msg" id="passwordMsg"></div>
        <button type="submit" id="passwordSubmit">Change password</button>
      </form>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  // Keep these in sync with the constants at the top of script.js.
  const SUPABASE_URL = 'https://eaohjlyiotyqhvsizcpw.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhb2hqbHlpb3R5cWh2c2l6Y3B3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNzUzMDksImV4cCI6MjA5ODc1MTMwOX0.lHF4OUiTT3G_fzlXvXI_4QMu48o6eEnq0hWw6K1uBAk';
  const GCSE_SESSION_KEY = 'gcse_session_v1';

  let supabaseClient = null;
  let currentSession = null;

  function readGcseSession() {
    try { return JSON.parse(localStorage.getItem(GCSE_SESSION_KEY) || 'null'); } catch (e) { return null; }
  }

  function esc(str) {
    return String(str ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }
  function showMsg(el, text, ok) { el.textContent = text; el.className = 'msg show ' + (ok ? 'ok' : 'error'); }
  function clearMsg(el) { el.className = 'msg'; }
  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString(undefined, { day:'numeric', month:'short', year:'numeric' });
  }

  async function initAuth() {
    const cached = readGcseSession();
    if (!cached) { location.replace('login.html?redirect=' + encodeURIComponent(location.pathname)); return false; }
    if (cached.role === 'teacher') { location.replace('teacher-dashboard.html'); return false; }

    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    window._gcseSupabaseClient = supabaseClient;
    const { data, error } = await supabaseClient.auth.setSession({
      access_token: cached.access_token, refresh_token: cached.refresh_token,
    });
    if (error || !data.session) {
      localStorage.removeItem(GCSE_SESSION_KEY);
      location.replace('login.html?redirect=' + encodeURIComponent(location.pathname));
      return false;
    }
    currentSession = data.session;
    localStorage.setItem(GCSE_SESSION_KEY, JSON.stringify({
      access_token: data.session.access_token, refresh_token: data.session.refresh_token,
      expires_at: data.session.expires_at, role: cached.role, username: cached.username,
    }));

    document.getElementById('accountBar').innerHTML =
      `<span>Logged in as <strong>${cached.username || 'you'}</strong></span>
       <button type="button" class="nav-link" id="logoutBtn">Log out</button>`;
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await supabaseClient.auth.signOut();
      localStorage.removeItem(GCSE_SESSION_KEY);
      location.replace('login.html');
    });

    document.getElementById('acctUsername').textContent = cached.username || '—';
    document.getElementById('acctRole').textContent = 'Student';
    return true;
  }

  async function loadAccountDetails() {
    const { data: profile } = await supabaseClient.from('profiles').select('created_at').eq('id', currentSession.user.id).single();
    document.getElementById('acctSince').textContent = profile ? fmtDate(profile.created_at) : '—';

    const container = document.getElementById('acctClasses');
    const { data: classes, error } = await supabaseClient.rpc('get_my_classes');
    if (error) {
      container.innerHTML = '<div class="empty">Couldn’t load your classes right now.</div>';
      return;
    }
    if (!classes || !classes.length) {
      container.innerHTML = '<div class="empty">You’re not in a class yet — ask your teacher to add you.</div>';
      return;
    }
    container.innerHTML = classes.map(c => `
      <div class="class-row">
        <span class="cname">${esc(c.class_name)}</span>
        <span class="cmeta">Teacher: ${esc(c.teacher_username || '—')} · Joined ${fmtDate(c.joined_at)}</span>
      </div>`).join('');
  }

  // ── tabs ──
  const tabAccountBtn = document.getElementById('tabAccountBtn');
  const tabPasswordBtn = document.getElementById('tabPasswordBtn');
  const panelAccount = document.getElementById('panelAccount');
  const panelPassword = document.getElementById('panelPassword');
  function switchTab(which) {
    const isAccount = which === 'account';
    tabAccountBtn.classList.toggle('active', isAccount);
    tabPasswordBtn.classList.toggle('active', !isAccount);
    tabAccountBtn.setAttribute('aria-selected', String(isAccount));
    tabPasswordBtn.setAttribute('aria-selected', String(!isAccount));
    panelAccount.classList.toggle('active', isAccount);
    panelPassword.classList.toggle('active', !isAccount);
  }
  tabAccountBtn.addEventListener('click', () => switchTab('account'));
  tabPasswordBtn.addEventListener('click', () => switchTab('password'));

  // ── show/hide password ──
  document.querySelectorAll('.pw-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.for);
      const show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      btn.textContent = show ? 'Hide' : 'Show';
      input.focus();
    });
  });

  // ── change password: direct client-side call, no current-password
  // re-entry needed (Supabase doesn't require it for an active session),
  // no Netlify function — RLS/auth already scope this to the caller. ──
  document.getElementById('passwordForm').addEventListener('submit', async e => {
    e.preventDefault();
    const msg = document.getElementById('passwordMsg');
    const submitBtn = document.getElementById('passwordSubmit');
    const pw = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    clearMsg(msg);

    if (pw.length < 8) return showMsg(msg, 'Password must be at least 8 characters.', false);
    if (pw !== confirm) return showMsg(msg, "Passwords don't match.", false);

    submitBtn.disabled = true;
    submitBtn.textContent = 'Changing…';
    const { error } = await supabaseClient.auth.updateUser({ password: pw });
    submitBtn.disabled = false;
    submitBtn.textContent = 'Change password';

    if (error) return showMsg(msg, error.message || 'Could not change your password. Try again.', false);
    document.getElementById('passwordForm').reset();
    showMsg(msg, 'Password changed — use it next time you log in.', true);
  });

  initAuth().then(ok => { if (ok) loadAccountDetails(); });
</script>
<script src="notifications-shared.js"></script>
<script src="footer-legal.js"></script>
</body>
</html>
