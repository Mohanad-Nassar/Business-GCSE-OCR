<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Business Studies — Paper 1 AO1 Practice</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #f7f5f0;
            --surface: #ffffff;
            --surface2: #f2efe8;
            --border: #e0dbd0;
            --border2: #cdc8b8;
            --text: #1a1814;
            --text2: #5a5548;
            --text3: #8a8478;
            --accent: #2d5a3d;
            --accent-light: #e8f2ec;
            --accent2: #8b4513;
            --accent2-light: #fdf2ea;
            --blue: #1d3d6b;
            --blue-light: #e8eef7;
            --red: #7a1f1f;
            --red-light: #fdeaea;
            --gold: #b8860b;
            --gold-light: #fdf8e8;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.10), 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 15px;
            line-height: 1.6;
        }

        /* ── HEADER ── */
        header {
            background: var(--accent);
            color: white;
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.18);
        }

        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .header-title {
            font-family: 'DM Serif Display', serif;
            font-size: 20px;
            letter-spacing: -0.3px;
        }

        .header-sub {
            font-size: 12px;
            opacity: 0.75;
            font-weight: 300;
            margin-top: 1px;
        }

        .progress-bar-wrap {
            flex: 1;
            min-width: 160px;
            max-width: 280px;
        }

        .progress-label {
            font-size: 11px;
            opacity: 0.8;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #7ecb9c;
            border-radius: 99px;
            transition: width 0.4s ease;
            width: 0%;
        }

        .header-stats {
            display: flex;
            gap: 16px;
            font-size: 12px;
            opacity: 0.85;
        }

        .stat {
            text-align: center;
        }

        .stat strong {
            display: block;
            font-size: 18px;
            font-weight: 600;
            line-height: 1;
        }

        /* ── CONTROLS ── */
        .controls {
            max-width: 1100px;
            margin: 24px auto 0;
            padding: 0 24px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .controls input,
        .controls select {
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            padding: 8px 12px;
            border: 1px solid var(--border2);
            border-radius: var(--radius-sm);
            background: var(--surface);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        .controls input {
            flex: 1;
            min-width: 200px;
        }

        .controls select {
            min-width: 160px;
        }

        .controls input:focus,
        .controls select:focus {
            border-color: var(--accent);
        }

        .q-count {
            font-size: 13px;
            color: var(--text3);
            padding: 8px 4px;
            white-space: nowrap;
        }

        /* ── MAIN ── */
        main {
            max-width: 1100px;
            margin: 20px auto 60px;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ── QUESTION CARD ── */
        .q-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        .q-card:hover {
            box-shadow: var(--shadow-lg);
        }

        .q-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }

        .q-number {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            background: var(--accent);
            color: white;
            padding: 3px 8px;
            border-radius: 6px;
            white-space: nowrap;
            margin-top: 2px;
        }

        .q-meta {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-left: auto;
            align-items: center;
        }

        .badge {
            font-size: 11px;
            font-weight: 500;
            padding: 3px 8px;
            border-radius: 99px;
            white-space: nowrap;
        }

        .badge-year {
            background: var(--gold-light);
            color: var(--gold);
            border: 1px solid #e8d88a;
        }

        .badge-topic {
            background: var(--blue-light);
            color: var(--blue);
            border: 1px solid #b8c8e0;
        }

        .badge-marks {
            background: var(--accent-light);
            color: var(--accent);
            border: 1px solid #b0d4be;
        }

        .badge-mcq {
            background: #e8f4fd;
            color: #1565a0;
            border: 1px solid #b3d4f0;
        }

        .badge-qer {
            background: var(--accent2-light);
            color: var(--accent2);
            border: 1px solid #e0c8b0;
        }

        .q-text {
            padding: 18px 20px 0;
            font-size: 15px;
            font-weight: 500;
            line-height: 1.55;
            color: var(--text);
        }

        .q-stem {
            background: var(--accent-light);
            border-left: 3px solid var(--accent);
            padding: 10px 14px;
            border-radius: 0 6px 6px 0;
            margin: 12px 20px;
            font-size: 13px;
            color: var(--text2);
            font-style: italic;
        }

        /* ── MCQ OPTIONS ── */
        .mcq-options {
            padding: 12px 20px 4px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .mcq-opt {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
            background: var(--surface);
        }

        .mcq-opt:hover {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        .mcq-opt.selected {
            border-color: var(--blue);
            background: var(--blue-light);
        }

        .mcq-opt.correct {
            border-color: #2d7a4f;
            background: #e8f5ee;
        }

        .mcq-opt.wrong {
            border-color: var(--red);
            background: var(--red-light);
        }

        .mcq-opt.show-correct {
            border-color: #2d7a4f;
            background: #e8f5ee;
        }

        .opt-letter {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1px solid var(--border2);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
            transition: all 0.15s;
        }

        .mcq-opt.correct .opt-letter {
            background: #2d7a4f;
            color: white;
            border-color: #2d7a4f;
        }

        .mcq-opt.wrong .opt-letter {
            background: var(--red);
            color: white;
            border-color: var(--red);
        }

        .mcq-opt.show-correct .opt-letter {
            background: #2d7a4f;
            color: white;
            border-color: #2d7a4f;
        }

        .opt-text {
            font-size: 14px;
            line-height: 1.5;
        }

        /* ── QER ANSWER ── */
        .qer-area {
            padding: 12px 20px 4px;
        }

        .qer-area textarea {
            width: 100%;
            min-height: 100px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            line-height: 1.6;
            padding: 12px 14px;
            border: 1.5px solid var(--border2);
            border-radius: var(--radius-sm);
            background: var(--surface);
            color: var(--text);
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        .qer-area textarea:focus {
            border-color: var(--accent);
        }

        .qer-area textarea::placeholder {
            color: var(--text3);
        }

        .qer-hint {
            font-size: 12px;
            color: var(--text3);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ── ACTIONS ── */
        .q-actions {
            padding: 14px 20px 18px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            border: 1.5px solid transparent;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .btn-primary:hover {
            background: #224830;
            border-color: #224830;
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent);
            border-color: var(--border2);
        }

        .btn-secondary:hover {
            background: var(--accent-light);
            border-color: var(--accent);
        }

        .btn-reset {
            background: transparent;
            color: var(--text3);
            border-color: var(--border);
            font-size: 12px;
            padding: 6px 12px;
            margin-left: auto;
        }

        .btn-reset:hover {
            color: var(--red);
            border-color: var(--red);
            background: var(--red-light);
        }

        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        /* ── RESULT FEEDBACK ── */
        .result-inline {
            margin: 0 20px 4px;
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .result-correct {
            background: #e8f5ee;
            color: #1a5c35;
            border: 1px solid #b0d8c0;
        }

        .result-wrong {
            background: var(--red-light);
            color: var(--red);
            border: 1px solid #e8b0b0;
        }

        /* ── MARKING SCHEME ── */
        .marking-scheme {
            margin: 0 20px 18px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            display: none;
        }

        .marking-scheme.visible {
            display: block;
        }

        .ms-header {
            background: var(--gold-light);
            border-bottom: 1px solid #e0d090;
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ms-body {
            padding: 16px;
            background: #fefdf8;
            font-size: 13.5px;
            line-height: 1.75;
            color: var(--text);
        }

        .ms-body h4 {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text3);
            margin: 14px 0 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border);
        }

        .ms-body h4:first-child {
            margin-top: 0;
        }

        .ms-body ul {
            list-style: none;
            padding: 0;
            margin: 0 0 8px;
        }

        .ms-body ul li {
            padding: 3px 0 3px 20px;
            position: relative;
            color: var(--text2);
        }

        .ms-body ul li::before {
            content: '•';
            position: absolute;
            left: 6px;
            color: var(--accent);
            font-weight: 700;
        }

        .ms-body .exemplar {
            background: var(--accent-light);
            border-left: 3px solid var(--accent);
            padding: 10px 14px;
            border-radius: 0 6px 6px 0;
            margin: 8px 0;
            font-style: italic;
            color: var(--text2);
            font-size: 13px;
        }

        .ms-body .exemplar strong {
            font-style: normal;
            color: var(--accent);
            font-size: 11px;
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .ms-body .examiner-comment {
            background: var(--blue-light);
            border-left: 3px solid var(--blue);
            padding: 10px 14px;
            border-radius: 0 6px 6px 0;
            margin: 8px 0;
            color: var(--text2);
            font-size: 13px;
        }

        .ms-body .examiner-comment strong {
            color: var(--blue);
            font-size: 11px;
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .ms-body .correct-answer {
            background: #e8f5ee;
            border: 1px solid #b0d8c0;
            border-radius: var(--radius-sm);
            padding: 8px 14px;
            font-weight: 600;
            color: #1a5c35;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
        }

        .ms-body .note {
            background: var(--gold-light);
            border-left: 3px solid var(--gold);
            padding: 8px 14px;
            border-radius: 0 6px 6px 0;
            margin: 8px 0;
            color: #7a6000;
            font-size: 12.5px;
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--text3);
        }

        .empty-state svg {
            opacity: 0.3;
            margin-bottom: 12px;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .header-inner {
                padding: 12px 16px;
            }

            .controls {
                padding: 0 16px;
            }

            main {
                padding: 0 16px;
                margin-bottom: 40px;
            }

            .q-header {
                flex-wrap: wrap;
            }

            .q-meta {
                margin-left: 0;
            }

            .header-stats {
                display: none;
            }
        }

        /* ── ANSWERED STATE ── */
        .q-card.answered .q-header {
            background: var(--accent-light);
            border-bottom-color: #b0d8c0;
        }

        .q-card.answered-wrong .q-header {
            background: var(--red-light);
            border-bottom-color: #e8b0b0;
        }
    </style>
</head>

<body>

    <header>
        <div class="header-inner">
            <div>
                <div class="header-title">OCR Business Studies</div>
                <div class="header-sub">Paper 1 · AO1 Practice Questions</div>
            </div>
            <div class="progress-bar-wrap">
                <div class="progress-label">
                    <span>Progress</span>
                    <span id="prog-label">0 / 0 answered</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>
            <div class="header-stats">
                <a href="../index.html" class="home-link">← 🏡 Home</a>

                <div class="stat"><strong id="stat-correct">0</strong><span>Correct</span></div>
                <div class="stat"><strong id="stat-attempted">0</strong><span>Attempted</span></div>
            </div>
        </div>
    </header>

    <div class="controls">
        <input type="text" id="search" placeholder="Search questions…" />
        <select id="yrFilter">
            <option value="">All years</option>
        </select>
        <select id="topicFilter">
            <option value="">All topics</option>
        </select>
        <select id="typeFilter">
            <option value="">MCQ &amp; QER</option>
            <option value="MCQ">MCQ only</option>
            <option value="QER">QER only</option>
        </select>
        <select id="markFilter">
            <option value="">All marks</option>
        </select>
        <span class="q-count" id="q-count"></span>
    </div>

    <main id="main"></main>

    <script>
        const questions = [
            {
                id: "q1", num: "1", yr: "2025", tp: "1.4 Business Aims and Objectives", mk: 1, type: "MCQ",
                q: "A business whose main objective is 'growth' is likely to be:",
                opts: ["A — considering reducing the size of its workforce", "B — having difficulty keeping up with demand", "C — struggling to stay in existence", "D — trying to gain new customers"],
                answer: "D",
                ms: {
                    correct: "D — trying to gain new customers",
                    indicative: [],
                    exemplar: [],
                    examiner: "",
                    note: ""
                }
            },
            {
                id: "q2", num: "2", yr: "2025", tp: "1.4 Business Aims and Objectives", mk: 1, type: "MCQ",
                q: "An 'established business' is a business that:",
                opts: ["A — has a good reputation", "B — has been operating for a long time", "C — is enterprising and creative", "D — is owned by more than one person"],
                answer: "B",
                ms: {
                    correct: "B — has been operating for a long time",
                    indicative: [],
                    exemplar: [],
                    examiner: "",
                    note: ""
                }
            },
            {
                id: "q3", num: "3", yr: "2025", tp: "3.4 Recruitment and Selection", mk: 2, type: "QER",
                q: "State two methods of selecting new employees.",
                stem: "Context: Denby Pottery Company (2025 Text 2)",
                ms: {
                    correct: "",
                    indicative: [
                        "CV / curriculum vitae / resumé",
                        "Application form",
                        "Letter of application",
                        "Interview",
                        "Group activity / group task",
                        "Test / exam / simulation / role-play / presentation",
                        "Work trial",
                        "Reference",
                        "Referral"
                    ],
                    marking: "One mark for each of two methods of selecting new employees. Answers do not need to relate to Denby.",
                    note: "NB: 'Trial' / 'Trialling' scores zero — trialling is a primary market research method, not a selection method.",
                    exemplar: [],
                    examiner: "This question was well answered with most candidates gaining full marks. Of those who did less well, answers appeared to relate to recruitment but not selection, e.g. apprenticeships, job advertisements, job centres; or were too vague, e.g. 'applications', 'letters', 'asking for a job'."
                }
            },
            {
                id: "q4", num: "4", yr: "2025", tp: "3.3 Communication in Business", mk: 1, type: "QER",
                q: "Identify one way of communicating in a business.",
                stem: "Context: Shropshire Fruit Farm (2025 Text 3)",
                ms: {
                    correct: "",
                    indicative: [
                        "Email",
                        "Face-to-face / in person",
                        "Letter",
                        "Meeting (e.g. staff meeting, online meeting, Teams meeting)",
                        "Memo",
                        "Noticeboard / bulletin board",
                        "Phone",
                        "Presentation",
                        "Report",
                        "Social media",
                        "Messaging app",
                        "Text",
                        "Walkie-talkies / two-way radio",
                        "Website"
                    ],
                    marking: "One mark for a way of communicating in a business. Answers do not need to relate to SFF.",
                    note: "Do NOT credit responses that only state brand names e.g. 'use Teams', 'use Zoom' (brand name alone = 0). However 'Teams meeting' scores 1 mark as the mark is awarded for 'meeting'.",
                    exemplar: [],
                    examiner: "Most candidates gained the mark for this question. By far the most common answers were 'email' and 'meetings'."
                }
            },
            {
                id: "q5", num: "5", yr: "2025", tp: "2.2 Market Research", mk: 1, type: "MCQ",
                q: "Which option contains two secondary sources of market research?",
                opts: ["A — Focus groups and websites", "B — Internal data and newspapers", "C — Magazines and questionnaires", "D — Place and product"],
                answer: "B",
                ms: {
                    correct: "B — Internal data and newspapers",
                    indicative: [],
                    exemplar: [],
                    examiner: "",
                    note: ""
                }
            },
            {
                id: "q6", num: "6", yr: "2025", tp: "3.1 The Role of Human Resources", mk: 1, type: "MCQ",
                q: "What is NOT a likely advantage of improving the human resources function in a business?",
                opts: ["A — Better training opportunities", "B — Greater use of trialling", "C — Higher levels of employee motivation", "D — More staff development"],
                answer: "B",
                ms: {
                    correct: "B — Greater use of trialling",
                    indicative: [],
                    exemplar: [],
                    examiner: "",
                    note: ""
                }
            },
            {
                id: "q7", num: "7", yr: "2025", tp: "3.6 Training and Development", mk: 1, type: "MCQ",
                q: "What is a form of staff development?",
                opts: ["A — A job description", "B — A person specification", "C — An apprenticeship", "D — An award scheme"],
                answer: "C",
                ms: {
                    correct: "C — An apprenticeship",
                    indicative: [],
                    exemplar: [],
                    examiner: "",
                    note: ""
                }
            },
            {
                id: "q8", num: "8", yr: "2025", tp: "3.2 Organisational Structures and Different Ways of Working", mk: 1, type: "MCQ",
                q: "A business with a tall organisational structure will have:",
                opts: ["A — a high market share", "B — lots of distribution channels", "C — multiple layers of authority", "D — short chains of command"],
                answer: "C",
                ms: {
                    correct: "C — multiple layers of authority",
                    indicative: [],
                    exemplar: [],
                    examiner: "",
                    note: ""
                }
            },
            {
                id: "q9", num: "9", yr: "2024", tp: "1.3 Business Ownership", mk: 2, type: "QER",
                q: "Explain one way that limited liability affects the owners of a company.",
                stem: "Context: J Sainsbury plc (2024 Text 1)",
                ms: {
                    correct: "",

                    examiner: "",
                    note: ""
                }
            },
            {
                id: "q77", num: "77", yr: "Practice 1", tp: "1.1 The Role of Business Enterprise and Entrepreneurship", mk: 2, type: "QER",
                q: "State two characteristics of an entrepreneur.",
                stem: "Context: Boohoo.com (Sample Text 1)",
                ms: {
                    correct: "",
                    indicative: [
                        "Willing to take risks",
                        "Determination",
                        "Confidence",
                        "Creativity / imaginative",
                        "Passionate",
                        "Hard working",
                        "Motivated",
                        "Disciplined",
                        "Adaptable / flexible",
                        "Knowledgeable",
                        "People person / good with people"
                    ],
                    marking: "One mark for each correct identification of a characteristic, up to a maximum of two marks.",
                    note: "",
                    exemplar: [],
                    examiner: ""
                }
            }
        ];

        // ── STATE ──
        const state = {};
        let statsCorrect = 0, statsAttempted = 0;

        // ── FILTERS ──
        const yearOrder = ["2025", "2024", "2023", "2022", "2021", "2020", "Sample", "2019", "Practice 1"];
        const years = [...new Set(questions.map(q => q.yr))].sort((a, b) => yearOrder.indexOf(a) - yearOrder.indexOf(b));
        const topics = [...new Set(questions.map(q => q.tp))].sort();
        const marks = [...new Set(questions.map(q => q.mk))].sort((a, b) => a - b);

        const yrSel = document.getElementById('yrFilter');
        const tpSel = document.getElementById('topicFilter');
        const mkSel = document.getElementById('markFilter');

        years.forEach(y => { const o = document.createElement('option'); o.value = y; o.textContent = y; yrSel.appendChild(o) });
        topics.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; tpSel.appendChild(o) });
        marks.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m + ' mark' + (m > 1 ? 's' : ''); mkSel.appendChild(o) });

        ['search', 'yrFilter', 'topicFilter', 'typeFilter', 'markFilter'].forEach(id => {
            document.getElementById(id).addEventListener('input', render);
            document.getElementById(id).addEventListener('change', render);
        });

        // ── BUILD MARKING SCHEME HTML ──
        function buildMS(q) {
            let html = '';
            const ms = q.ms;

            if (q.type === 'MCQ') {
                html += `<div class="correct-answer">✓ Correct answer: ${ms.correct}</div>`;
                if (ms.examiner) {
                    html += `<div class="examiner-comment"><strong>📋 Examiner's Comments</strong>${ms.examiner.replace(/\n/g, '<br><br>')}</div>`;
                }
                return html;
            }

            // QER
            if (ms.marking) {
                html += `<h4>How to award marks</h4><p style="color:var(--text2);margin-bottom:8px;">${ms.marking}</p>`;
            }

            if (ms.indicative && ms.indicative.length) {
                html += `<h4>Indicative content — accept any of the following</h4><ul>`;
                ms.indicative.forEach(i => { html += `<li>${i}</li>`; });
                html += `</ul>`;
            }

            if (ms.note) {
                html += `<div class="note">⚠️ <strong>Examiner's note:</strong> ${ms.note}</div>`;
            }

            if (ms.exemplar && ms.exemplar.length) {
                ms.exemplar.forEach(ex => {
                    html += `<div class="exemplar"><strong>✏️ Exemplar response</strong>${ex}</div>`;
                });
            }

            if (ms.examiner) {
                html += `<div class="examiner-comment"><strong>📋 Examiner's Comments</strong>${ms.examiner.replace(/\n/g, '<br><br>')}</div>`;
            }

            return html;
        }

        // ── BUILD CARD ──
        function buildCard(q) {
            const div = document.createElement('div');
            div.className = 'q-card';
            div.id = 'card-' + q.id;

            const typeBadge = q.type === 'MCQ'
                ? '<span class="badge badge-mcq">MCQ</span>'
                : '<span class="badge badge-qer">QER</span>';

            let body = '';

            if (q.type === 'MCQ') {
                const opts = q.opts.map((o, i) => {
                    const letter = String.fromCharCode(65 + i);
                    return `<div class="mcq-opt" id="opt-${q.id}-${letter}" onclick="selectOpt('${q.id}','${letter}')">
        <span class="opt-letter">${letter}</span>
        <span class="opt-text">${o.replace(/^[A-D] — /, '')}</span>
      </div>`;
                }).join('');
                body = `<div class="mcq-options">${opts}</div>`;
            } else {
                body = `<div class="qer-area">
      <textarea id="ta-${q.id}" placeholder="Write your answer here… (${q.mk} mark${q.mk > 1 ? 's' : ''} available)"></textarea>
      <div class="qer-hint">💡 Aim for ${q.mk} clear point${q.mk > 1 ? 's' : ''} — one per mark</div>
    </div>`;
            }

            const stem = q.stem ? `<div class="q-stem">📄 ${q.stem}</div>` : '';

            div.innerHTML = `
    <div class="q-header">
      <span class="q-number">Q${q.num}</span>
      <span style="font-weight:500;font-size:14px;flex:1;">${q.q}</span>
      <div class="q-meta">
        <span class="badge badge-year">${q.yr}</span>
        <span class="badge badge-marks">${q.mk} mark${q.mk > 1 ? 's' : ''}</span>
        ${typeBadge}
        <span class="badge badge-topic">${q.tp}</span>
      </div>
    </div>
    <div class="q-text" id="qtext-${q.id}" style="display:none">${q.q}</div>
    ${stem}
    ${body}
    <div id="result-${q.id}"></div>
    <div class="q-actions">
      ${q.type === 'MCQ'
                    ? `<button class="btn btn-primary" onclick="submitMCQ('${q.id}')" id="btn-submit-${q.id}">Submit answer</button>`
                    : `<button class="btn btn-primary" onclick="submitQER('${q.id}')" id="btn-submit-${q.id}">Submit &amp; view marking scheme</button>`
                }
      <button class="btn btn-secondary" onclick="toggleMS('${q.id}')" id="btn-ms-${q.id}">View marking scheme</button>
      <button class="btn btn-reset" onclick="resetQ('${q.id}')">↺ Reset</button>
    </div>
    <div class="marking-scheme" id="ms-${q.id}">
      <div class="ms-header">📝 Official Marking Scheme</div>
      <div class="ms-body">${buildMS(q)}</div>
    </div>
  `;
            return div;
        }

        // ── INTERACTIONS ──
        function selectOpt(qid, letter) {
            const q = questions.find(x => x.id === qid);
            if (state[qid] && state[qid].submitted) return;
            if (!state[qid]) state[qid] = {};
            state[qid].selected = letter;
            q.opts.forEach((_, i) => {
                const l = String.fromCharCode(65 + i);
                const el = document.getElementById('opt-' + qid + '-' + l);
                el.className = 'mcq-opt' + (l === letter ? ' selected' : '');
            });
            document.getElementById('btn-submit-' + qid).disabled = false;
        }

        function submitMCQ(qid) {
            const q = questions.find(x => x.id === qid);
            const s = state[qid];
            if (!s || !s.selected) { alert('Please select an answer first.'); return; }
            if (s.submitted) return;
            s.submitted = true;
            const correct = s.selected === q.answer;
            q.opts.forEach((_, i) => {
                const l = String.fromCharCode(65 + i);
                const el = document.getElementById('opt-' + qid + '-' + l);
                if (l === q.answer) el.className = 'mcq-opt show-correct';
                else if (l === s.selected && !correct) el.className = 'mcq-opt wrong';
                else el.className = 'mcq-opt';
            });
            const res = document.getElementById('result-' + qid);
            if (correct) {
                res.innerHTML = '<div class="result-inline result-correct">✓ Correct! Well done.</div>';
                document.getElementById('card-' + qid).classList.add('answered');
                statsCorrect++;
            } else {
                res.innerHTML = `<div class="result-inline result-wrong">✗ Incorrect. The correct answer is <strong>${q.answer}</strong>.</div>`;
                document.getElementById('card-' + qid).classList.add('answered-wrong');
            }
            statsAttempted++;
            updateStats();
            document.getElementById('btn-submit-' + qid).disabled = true;
            // auto show MS
            const ms = document.getElementById('ms-' + qid);
            ms.classList.add('visible');
            document.getElementById('btn-ms-' + qid).textContent = 'Hide marking scheme';
        }

        function submitQER(qid) {
            const s = state[qid] || {};
            if (s.submitted) return;
            s.submitted = true;
            state[qid] = s;
            statsAttempted++;
            document.getElementById('card-' + qid).classList.add('answered');
            document.getElementById('btn-submit-' + qid).disabled = true;
            document.getElementById('ta-' + qid).disabled = true;
            updateStats();
            const ms = document.getElementById('ms-' + qid);
            ms.classList.add('visible');
            document.getElementById('btn-ms-' + qid).textContent = 'Hide marking scheme';
        }

        function toggleMS(qid) {
            const ms = document.getElementById('ms-' + qid);
            const btn = document.getElementById('btn-ms-' + qid);
            if (ms.classList.contains('visible')) {
                ms.classList.remove('visible');
                btn.textContent = 'View marking scheme';
            } else {
                ms.classList.add('visible');
                btn.textContent = 'Hide marking scheme';
            }
        }

        function resetQ(qid) {
            const q = questions.find(x => x.id === qid);
            const wasSubmitted = state[qid] && state[qid].submitted;
            const wasCorrect = state[qid] && state[qid].correct;
            if (wasSubmitted) {
                statsAttempted = Math.max(0, statsAttempted - 1);
                if (wasCorrect) statsCorrect = Math.max(0, statsCorrect - 1);
            }
            delete state[qid];
            if (q.type === 'MCQ') {
                q.opts.forEach((_, i) => {
                    const l = String.fromCharCode(65 + i);
                    document.getElementById('opt-' + qid + '-' + l).className = 'mcq-opt';
                });
            } else {
                const ta = document.getElementById('ta-' + qid);
                if (ta) { ta.value = ''; ta.disabled = false; }
            }
            document.getElementById('result-' + qid).innerHTML = '';
            document.getElementById('ms-' + qid).classList.remove('visible');
            document.getElementById('btn-ms-' + qid).textContent = 'View marking scheme';
            document.getElementById('btn-submit-' + qid).disabled = false;
            const card = document.getElementById('card-' + qid);
            card.classList.remove('answered', 'answered-wrong');
            updateStats();
        }

        function updateStats() {
            document.getElementById('stat-correct').textContent = statsCorrect;
            document.getElementById('stat-attempted').textContent = statsAttempted;
            const total = questions.length;
            const pct = Math.round((statsAttempted / total) * 100);
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('prog-label').textContent = statsAttempted + ' / ' + total + ' answered';
        }

        // ── RENDER ──
        function render() {
            const search = document.getElementById('search').value.toLowerCase();
            const yr = document.getElementById('yrFilter').value;
            const tp = document.getElementById('topicFilter').value;
            const type = document.getElementById('typeFilter').value;
            const mk = document.getElementById('markFilter').value;

            const filtered = questions.filter(q => {
                if (yr && q.yr !== yr) return false;
                if (tp && q.tp !== tp) return false;
                if (type && q.type !== type) return false;
                if (mk && String(q.mk) !== mk) return false;
                if (search && !q.q.toLowerCase().includes(search) && !q.tp.toLowerCase().includes(search) && !q.num.includes(search)) return false;
                return true;
            });

            document.getElementById('q-count').textContent = filtered.length + ' question' + (filtered.length !== 1 ? 's' : '');
            const main = document.getElementById('main');
            main.innerHTML = '';

            if (filtered.length === 0) {
                main.innerHTML = '<div class="empty-state"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>No questions match your filters.</p></div>';
                return;
            }

            filtered.forEach(q => {
                main.appendChild(buildCard(q));
                // restore state if card was previously answered
                if (state[q.id] && state[q.id].submitted) {
                    // re-apply visual state silently
                }
            });
        }

        render();
        updateStats();
    </script>
</body>

</html>
