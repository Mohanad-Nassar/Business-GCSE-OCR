[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # SUPABASE_URL is a PUBLIC value — it's the project's API address and is
  # meant to live in the front-end JavaScript (just like the anon key).
  # Netlify's secret scanner flags it only because it's also registered as
  # an env var and appears in committed files. Telling the scanner to skip
  # this one key clears the false positive. The service_role key is
  # deliberately NOT listed here, so it stays fully protected — and it must
  # never appear in any committed file.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL"

[functions]
  node_bundler = "esbuild"

# Weekly cron: builds/tops-up each student's "retry what you got wrong" task.
# Runs with no HTTP caller — see netlify/functions/weekly-retry-tasks.js.
[functions."weekly-retry-tasks"]
  schedule = "@weekly"

# WP-A7 security headers — applied to every response.
# The CSP intentionally allows inline scripts/styles, the jsDelivr CDN (which
# serves the Supabase JS client) and Google Fonts because the current pages
# rely on all three; tightening below this WILL break the site. Vendoring the
# CDN so 'unsafe-inline'/jsdelivr can be dropped is a separate, DEFERRED work
# package. connect-src pins the app's own Supabase project origin.
# 'wasm-unsafe-eval' + jsDelivr in connect-src: the CS Practice Lab runs
# Pyodide (Python) and sql.js (SQL) as WebAssembly loaded from jsDelivr —
# WASM compilation needs the former; their stdlib/.wasm fetches need the
# latter. See CS-CONTENT-PLAN.md §7.2.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com 'self'; img-src 'self' data: https://eaohjlyiotyqhvsizcpw.supabase.co; connect-src 'self' https://eaohjlyiotyqhvsizcpw.supabase.co https://cdn.jsdelivr.net; frame-ancestors 'none'"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cross-origin isolation for the CS Practice Lab ONLY. The Python Lab lets
# students type into the console mid-run: Python's input() is synchronous, so
# the Pyodide Web Worker blocks on Atomics.wait against a SharedArrayBuffer
# while the main thread collects a typed line. SharedArrayBuffer is only
# available in a cross-origin-isolated context (COOP: same-origin + COEP).
# COEP=credentialless (not require-corp) is used so cross-origin no-cors
# subresources — Google Fonts especially — keep loading without needing CORP
# headers; jsDelivr (Pyodide/CodeMirror/sql.js) already sends CORP cross-origin
# and CORS, and Supabase is a CORS API, so both work under isolation.
# Scoped to /subjects/computer-science/* and /cs-lab/* so nothing else on the
# site (Business/Economics, the hub, teacher pages) is affected. If a browser
# doesn't support isolation, py-runner.js falls back to pre-supplied inputs.
[[headers]]
  for = "/subjects/computer-science/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "credentialless"

[[headers]]
  for = "/cs-lab/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "credentialless"

# WP-C6 caching — images only. They're re-fetched on every page yet rarely
# change, so cache for a day then serve-stale-while-revalidating for a week
# (a changed chart shows within a day; no full re-download in between).
# Deliberately NOT applied to HTML/JS: those aren't content-hashed, so a
# long cache would serve stale code after a deploy — Netlify's default
# ETag revalidation already keeps them cheap (304s) without that risk.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# WP-A3 content gate: every request under /subjects/ must carry a valid
# session whose account may access that subject — course content is no
# longer publicly fetchable. question-bank.js is teacher-only on top.
# Kill switch: set env var CONTENT_GATE_DISABLED=true and redeploy.
# See netlify/edge-functions/content-gate.ts + supabase/entitlements.sql.
#
# If /subjects/* ever 500s locally with "There was an error with an Edge
# Function", the cause is almost certainly netlify's cached Deno binary, NOT
# this config or content-gate.ts. Netlify keeps it in
# %APPDATA%\netlify\Config\deno-cli\ and trusts version.txt without checking
# that deno.exe actually exists — a failed download leaves a 0-byte
# deno-cli-latest.zip and no binary, and it then crash-loops ("Invalid
# Version" / "deno.exe is not recognized") instead of re-downloading. Fix:
# delete that whole deno-cli folder and restart `netlify dev`. Do NOT disable
# this block to work around it — that ships course content ungated.
[[edge_functions]]
  path = "/subjects/*"
  function = "content-gate"

# The answer key must be gated wherever it lands, not only under /subjects/*.
# `--legacy` writes an unprefixed question-bank.js to the repo root, and
# publish = "." would then serve /question-bank.js — every answer, to anyone,
# outside the mount above. The file is absent today and nothing loads it, so
# this guards a footgun rather than a live hole: it means a stray --legacy run
# can't quietly publish the key. The gate denies the bank to non-teachers and
# fails CLOSED on it (see content-gate.ts).
[[edge_functions]]
  path = "/question-bank.js"
  function = "content-gate"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

