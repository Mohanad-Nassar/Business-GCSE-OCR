<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Review Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&amp;family=DM+Sans:wght@300;400;500;600&amp;family=Playfair+Display:wght@600;700&amp;display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="business-style.css"/>
  <style>
    /* Hard reset: business-style.css turns <body> into a sidebar grid on
       desktop for topic pages. This standalone page has no sidebar. */
    html, body {
      display: block !important;
      grid-template-columns: none !important;
      grid-template-rows: none !important;
      grid-template-areas: none !important;
    }
    header, main { grid-area: unset !important; }
    body { background: var(--paper); color: var(--ink); min-height: 100vh; overflow-x: hidden; }
    :focus-visible { outline:3px solid var(--accent); outline-offset:2px; border-radius:4px; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation:none !important; transition:none !important; }
    }

    /* ── Header (mirrors daily-revise) ── */
    header {
      background-color: var(--ink); border-bottom: 3px solid var(--accent);
      /* Decorative circle as a background so the header needs no
         overflow:hidden that would clip the account dropdown / bell panel. */
      background-image: radial-gradient(circle 110px at calc(100% - 60px) 60px,
        rgba(122,92,158,.14) 0, rgba(122,92,158,.14) 109px, transparent 110px);
      background-repeat: no-repeat;
      padding: 28px 40px 24px; position: relative;
    }
    .header-inner { position:relative; z-index:1; display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:16px; }
    .header-badge {
      display:inline-block; background:var(--accent); color:#fff;
      font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.14em;
      text-transform:uppercase; padding:4px 12px; border-radius:3px; margin-bottom:12px;
    }
    header h1 { font-family:'Playfair Display',serif; font-size:clamp(22px,3.5vw,30px); font-weight:700; color:var(--paper); line-height:1.15; margin-bottom:5px; }
    header p { font-size:13px; color:rgba(245,240,232,.6); }
    .header-links { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start; }
    .nav-link {
      background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
      color:var(--paper); font-family:'DM Mono',monospace; font-size:11px;
      padding:8px 16px; border-radius:6px; text-decoration:none; white-space:nowrap;
      transition:background .15s,border-color .15s;
    }
    .nav-link:hover { background:rgba(255,255,255,.18); border-color:var(--gold); }
    .gcse-account-bar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; font-family:'DM Mono',monospace; font-size:11px; color:rgba(245,240,232,.75); }
    .gcse-account-bar button.nav-link { cursor:pointer; }

    main { max-width:860px; margin:0 auto; padding:28px 24px 80px; }
    .panel { background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:22px 24px; margin-bottom:22px; }
    .muted { color:var(--mid); font-size:12.5px; line-height:1.6; }
    .sr-section-title { font-family:'Playfair Display',serif; font-size:19px; font-weight:700; margin-bottom:14px; }

    /* Stats strip */
    .sr-stats { display:flex; gap:18px; flex-wrap:wrap; margin-bottom:20px; font-family:'DM Mono',monospace; font-size:12px; color:var(--mid); }
    .sr-stats .stat { display:flex; align-items:center; gap:6px; }
    .sr-stats .stat b { color:var(--ink); font-size:15px; }

    .chip { display:inline-block; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.05em; padding:3px 10px; border-radius:99px; background:rgba(122,92,158,.12); color:var(--accent); border:1px solid rgba(122,92,158,.3); }

    /* Empty / message states */
    .sr-empty { text-align:center; padding:20px 8px; }
    .sr-empty-emoji { font-size:34px; margin-bottom:8px; }
    .sr-empty p { font-size:14px; margin:4px 0; }
    .sr-inline-link { color:var(--accent); font-weight:600; text-decoration:none; font-family:'DM Mono',monospace; font-size:12.5px; }
    .sr-inline-link:hover { text-decoration:underline; }

    /* Due-now rows */
    .sr-due-row { display:flex; align-items:center; justify-content:space-between; gap:14px; padding:13px 0; border-bottom:1px solid var(--border); }
    .sr-due-row:last-child { border-bottom:none; }
    .sr-due-main { min-width:0; }
    .sr-due-name { font-size:14.5px; font-weight:600; margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sr-due-meta { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .sr-due-when { font-family:'DM Mono',monospace; font-size:11px; color:var(--mid); }
    .sr-due-row.is-overdue .sr-due-when { color:var(--wrong); font-weight:600; }
    .sr-start-btn { flex:0 0 auto; }

    /* Buttons */
    .btn { background:var(--ink); color:var(--paper); border:none; padding:10px 18px; border-radius:7px; font-family:'DM Sans',sans-serif; font-weight:600; font-size:13.5px; cursor:pointer; transition:background .15s; }
    .btn:hover { background:#1c2c3d; }
    .btn:disabled { opacity:.5; cursor:default; }
    .btn-ghost { background:transparent; color:var(--ink); border:1px solid var(--border); }
    .btn-ghost:hover { background:var(--cream); border-color:var(--accent); }

    /* ── Calendar ── */
    .sr-cal-head { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
    .sr-cal-title { font-family:'Playfair Display',serif; font-size:clamp(18px,2.6vw,24px); font-weight:700; }
    .sr-cal-nav { display:flex; align-items:center; gap:8px; }
    .sr-nav-btn { background:var(--cream); border:1px solid var(--border); color:var(--ink); width:34px; height:34px; border-radius:8px; cursor:pointer; font-size:15px; line-height:1; }
    .sr-nav-btn:hover { border-color:var(--accent); color:var(--accent); }
    .sr-today-btn { background:transparent; border:1px solid var(--border); color:var(--ink); font-family:'DM Mono',monospace; font-size:11.5px; padding:7px 14px; border-radius:8px; cursor:pointer; }
    .sr-today-btn:hover { border-color:var(--accent); color:var(--accent); }

    .sr-cal-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .sr-cal-dowrow, .sr-cal-body { min-width:640px; }
    .sr-cal-dowrow { display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:6px; margin-bottom:6px; }
    .sr-cal-dow { font-family:'DM Mono',monospace; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--mid); text-align:center; padding:2px 0; }
    .sr-cal-body { display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:6px; }
    .sr-cell { min-height:96px; min-width:0; border:1px solid var(--border); border-radius:8px; background:var(--cream); padding:5px 5px 6px; display:flex; flex-direction:column; }
    .sr-cell.sr-out { opacity:.4; background:transparent; }
    .sr-cell.sr-today { border-color:var(--accent); border-width:2px; box-shadow:0 0 0 1px var(--accent) inset; }
    .sr-cell-num { font-family:'DM Mono',monospace; font-size:11.5px; color:var(--mid); margin-bottom:4px; }
    .sr-cell.sr-today .sr-cell-num { color:var(--accent); font-weight:700; }
    .sr-cell-chips { display:flex; flex-direction:column; gap:3px; }

    .sr-chip { border-radius:5px; padding:2px 5px; font-size:10px; line-height:1.25; overflow:hidden; }
    .sr-chip .sr-chip-name { display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:600; }
    .sr-chip .sr-chip-stage { display:block; font-family:'DM Mono',monospace; font-size:8.5px; letter-spacing:.03em; opacity:.85; }
    .sr-chip.is-clickable { cursor:pointer; }
    .sr-chip.is-clickable:hover { filter:brightness(.96); }
    .sr-completed { background:#d4edda; color:#1a5c34; border:1px solid #9ed3ad; }
    .sr-due { background:var(--accent); color:#fff; }
    .sr-overdue { background:#fde2e2; color:#8b2317; border:1px solid #f0b3ab; }
    .sr-upcoming { background:#ece7dc; color:var(--mid); border:1px dashed var(--border); }
    .sr-chip-extra { display:none; }
    .sr-cell.sr-expanded .sr-chip-extra { display:block; }
    .sr-more { background:transparent; border:none; color:var(--accent); font-family:'DM Mono',monospace; font-size:9.5px; cursor:pointer; padding:1px 2px; text-align:left; }
    .sr-more:hover { text-decoration:underline; }

    /* WP-A5: teacher-set task deadlines share the grid with reviews.
       Reviews keep their soft/outline look above; tasks are SOLID chips so
       the two kinds read differently at a glance. --chip-accent carries the
       subject colour in the all-subjects view. */
    .sr-chip-task { background:var(--chip-accent, var(--ink)); color:#fff; display:block; text-decoration:none; }
    .sr-chip-task .sr-chip-stage { opacity:.9; }
    .sr-chip-task.is-done { opacity:.55; }
    .sr-chip.sr-subject-accented { border-left:3px solid var(--chip-accent, var(--accent)); }

    /* Filter bar (subjects × event types) + legend */
    .sr-filterbar { display:flex; flex-wrap:wrap; gap:8px 14px; align-items:center; margin-bottom:14px; }
    .sr-filterbar .sr-fgroup { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
    .sr-filterbar .sr-flabel { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--mid); }
    .sr-fchip { border:1px solid var(--border); background:#fff; color:var(--mid); border-radius:99px;
      padding:5px 12px; font-size:12px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px;
      transition:border-color .15s, background .15s, color .15s; }
    .sr-fchip[aria-pressed="true"] { background:var(--chip-accent, var(--accent)); border-color:var(--chip-accent, var(--accent)); color:#fff; }
    .sr-fchip:hover { border-color:var(--chip-accent, var(--accent)); }
    .sr-legend { display:flex; flex-wrap:wrap; gap:12px; margin-top:12px; }
    .sr-legend span { display:inline-flex; align-items:center; gap:6px; font-family:'DM Mono',monospace; font-size:10.5px; color:var(--mid); }
    .sr-legend .lg-review { width:12px; height:12px; border-radius:3px; background:#ece7dc; border:1px dashed var(--border); display:inline-block; }
    .sr-legend .lg-task { width:12px; height:12px; border-radius:3px; background:var(--ink); display:inline-block; }

    /* ── Quiz modal ── */
    .sr-modal-backdrop { position:fixed; inset:0; background:rgba(15,25,35,.45); z-index:899; opacity:0; pointer-events:none; transition:opacity .2s ease; }
    .sr-modal-backdrop.show { opacity:1; pointer-events:auto; }
    .sr-modal {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-46%) scale(.98);
      width:600px; max-width:94vw; max-height:90vh; overflow-y:auto;
      background:var(--card-bg); border:1px solid var(--border); border-radius:14px;
      box-shadow:0 20px 60px rgba(0,0,0,.28); z-index:900; padding:26px 28px;
      opacity:0; pointer-events:none; transition:opacity .2s ease, transform .2s ease;
    }
    .sr-modal.show { opacity:1; pointer-events:auto; transform:translate(-50%,-50%) scale(1); }
    .sr-modal-close { position:absolute; top:12px; right:14px; background:none; border:none; font-size:17px; cursor:pointer; color:var(--mid); padding:4px 8px; border-radius:6px; line-height:1; }
    .sr-modal-close:hover { background:var(--cream); color:var(--ink); }

    .sr-quiz-head { margin-bottom:6px; }
    .sr-quiz-title { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; line-height:1.2; }
    .sr-quiz-sub { margin-top:6px; }
    .sr-quiz-progress { display:flex; align-items:center; justify-content:space-between; gap:12px; margin:14px 0 16px; }
    .sr-progress-text { font-family:'DM Mono',monospace; font-size:11.5px; color:var(--mid); }
    .sr-dots { display:flex; gap:6px; }
    .sr-dot { width:11px; height:11px; border-radius:50%; background:var(--border); opacity:.5; }
    .sr-dot-correct { background:var(--success); opacity:1; }
    .sr-dot-wrong { background:var(--wrong); opacity:1; }

    .qhead { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px; font-family:'DM Mono',monospace; font-size:11px; color:var(--mid); text-transform:uppercase; letter-spacing:.06em; }
    .qtext { font-size:15px; font-weight:600; line-height:1.55; margin-bottom:16px; }
    .case-study { background:#f0ece4; border-left:4px solid var(--accent); border-radius:0 6px 6px 0; padding:12px 14px; font-size:13px; line-height:1.7; margin-bottom:14px; white-space:pre-wrap; }

    .opt {
      display:block; border:1.5px solid var(--border); background:var(--cream);
      border-radius:7px; padding:11px 16px; margin-bottom:9px; cursor:pointer;
      font-size:13.5px; transition:background .15s,border-color .15s;
    }
    .opt:hover { background:#e8e1d3; border-color:var(--mid); }
    .opt input { margin-right:8px; }
    .opt.correct { background:#d4edda; border-color:var(--success); color:var(--success); font-weight:600; }
    .opt.wrong { background:#fde8e5; border-color:var(--wrong); color:var(--wrong); font-weight:600; }
    .opt.disabled { pointer-events:none; }

    .fib-text { font-size:15px; line-height:2.4; margin-bottom:10px; }
    .fib-input {
      background:var(--cream); border:2px solid var(--accent); border-radius:6px;
      padding:4px 10px; font-family:'DM Mono',monospace; font-size:13px; font-weight:600;
      color:var(--ink); width:140px; outline:none; text-align:center; margin:0 4px;
    }
    .fib-input.correct { border-color:var(--success); background:#d4edda; }
    .fib-input.wrong { border-color:var(--wrong); background:#fde8e5; }
    .blank-select {
      appearance:none; -webkit-appearance:none;
      background:var(--cream); border:2px solid var(--accent); border-radius:6px;
      padding:4px 22px 4px 10px; font-family:'DM Mono',monospace; font-size:13px; font-weight:600;
      color:var(--ink); outline:none; margin:0 4px;
    }
    .blank-select.correct { border-color:var(--success); background:#d4edda; }
    .blank-select.wrong { border-color:var(--wrong); background:#fde8e5; }
    .dr-fib-answer { font-size:12.5px; color:var(--success); font-weight:600; }
    .sr-mode-btn { background:transparent; border:1px solid var(--border); color:var(--ink); font-family:'DM Mono',monospace; font-size:11.5px; padding:7px 14px; border-radius:7px; cursor:pointer; }
    .sr-mode-btn:hover { border-color:var(--accent); color:var(--accent); }

    .dr-feedback { margin-top:16px; padding:12px 16px; border-radius:8px; font-size:13.5px; line-height:1.6; display:none; }
    .dr-feedback.show { display:block; }
    .dr-feedback.m0 { background:#fde2e2; color:#8b2317; }
    .dr-feedback.m3 { background:#d4edda; color:#1a5c34; }

    .sr-actions { margin-top:18px; display:flex; justify-content:flex-end; align-items:center; gap:10px; }

    /* Celebration / retry states */
    .sr-celebrate { text-align:center; padding:14px 6px; }
    .sr-celebrate-tick {
      width:70px; height:70px; margin:0 auto 14px; border-radius:50%;
      background:var(--success); color:#fff; font-size:38px; line-height:70px; font-weight:700;
    }
    .sr-celebrate-tick.sr-fail { background:var(--gold); color:var(--ink); }

    @media (max-width:560px) {
      header { padding:22px 20px 20px; }
      main { padding:22px 14px 70px; }
      .panel { padding:18px 16px; }
    }
  </style>
</head>
<body>

<header>
  <nav class="site-band" aria-label="Site">
    <a class="sb-brand" href="/hub.html"><span aria-hidden="true">🏡</span> All Topics</a>
    <a class="nav-link" id="srDashLink" href="dashboard.html">📊 My Progress</a>
    <span class="gcse-account-bar" id="accountBar"></span>
  </nav>
  <div class="header-inner">
    <div>
      <div class="header-badge" id="srSubjectBadge">Review Calendar</div>
      <h1>🗓️ Review Calendar</h1>
      <p>Spaced-out reviews — each topic comes back after 1 day, 1 week and 4 weeks. Pass a short quiz to tick one off.</p>
    </div>
    <div class="header-links">
      <a class="nav-link" id="srDailyLink" href="daily-revise.html">🎯 Daily Revise</a>
    </div>
  </div>
</header>

<main>
  <div class="sr-stats" id="srStats"></div>

  <div class="panel" id="srDueNow">
    <div class="sr-empty"><div class="sr-empty-emoji">⏳</div><p>Loading your reviews…</p></div>
  </div>

  <div class="panel">
    <div class="sr-filterbar" id="srFilterBar" style="display:none;"></div>
    <div class="sr-cal-head">
      <div class="sr-cal-title" id="srCalTitle">—</div>
      <div class="sr-cal-nav">
        <button type="button" class="sr-nav-btn" id="srPrevBtn" aria-label="Previous month">‹</button>
        <button type="button" class="sr-today-btn" id="srTodayBtn">Today</button>
        <button type="button" class="sr-nav-btn" id="srNextBtn" aria-label="Next month">›</button>
      </div>
    </div>
    <div class="sr-cal-scroll">
      <div id="srCalGrid"></div>
    </div>
    <div class="sr-legend" id="srLegend"></div>
  </div>
</main>

<!-- Quiz modal (single-panel feel, sits over the calendar) -->
<div class="sr-modal-backdrop" id="srQuizBackdrop"></div>
<div class="sr-modal" id="srQuizModal" role="dialog" aria-modal="true" aria-label="Topic review quiz">
  <button type="button" class="sr-modal-close" id="srQuizClose" aria-label="Close">✕</button>
  <div id="srQuizPanel"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/subjects-index.js"></script>
<script src="/page-groups-all.js"></script>
<script src="/section-totals-all.js"></script>
<script src="/subject-loader.js"></script>
<script>subjectLoaderInit({ mode: 'single' });</script>
<script src="progress-shared.js"></script>
<script src="tasks-shared.js"></script>
<script src="/account-cluster.js"></script>
<script src="/notifications-shared.js"></script>
<script src="gamification.js"></script>
<script src="spaced-repetition.js"></script>
<script src="review-calendar.js"></script>
<script src="footer-legal.js"></script>
</body>
</html>
